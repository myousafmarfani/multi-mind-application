<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multiminds Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="icon" href="assets/website_logo (2).png" type="image/png">
</head>
<body>
    
    <!-- Chat Overlay -->
    <div class="chat-overlay" id="chatOverlay"></div>
    
    <!-- Tech Animation Overlay -->
    <div class="tech-animation-overlay" id="techAnimationOverlay">
        <div class="tech-animation-container">
            <div class="tech-animation-title">🚀 AI Prompt Enhancement</div>
            
            <!-- Neural Network Animation -->
            <div class="neural-network" id="neuralNetwork">
                <!-- Nodes will be generated by JavaScript -->
            </div>
            
            <!-- Code Stream Background -->
            <div class="code-stream" id="codeStream">
                <!-- Code lines will be generated by JavaScript -->
            </div>
            
            <div class="processing-text" id="processingText"></div>
        </div>
    </div>
    
    <!-- Think Longer Overlay -->
    <div class="thinking-longer-overlay" id="thinkingLongerOverlay">
        <div class="thinking-longer-content">
            <div class="thinking-longer-text">🤔 Thinking Longer...</div>
            <div class="thinking-progress">
                <div class="thinking-progress-bar"></div>
            </div>
        </div>
    </div>
    
    <!-- Show Sidebar Toggle (appears when sidebar is hidden) -->
    <button class="sidebar-show-toggle" id="sidebarShowToggle" title="Show Sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
    </button>

    <div class="chat-container">
        <!-- Conversation History Sidebar -->
        <div class="conversation-sidebar">
            <div class="sidebar-header">
                <button class="sidebar-toggle" id="sidebarToggle" title="Hide Sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="15" y1="9" x2="15" y2="15"/>
                        <line x1="15" y1="3" x2="15" y2="21"/>
                    </svg>
                </button>
                <button class="new-chat-btn" onclick="chatInstance.startNewConversation()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    New Chat
                </button>
            </div>
            <div id="conversationHistory"></div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat-area">

            
            <!-- Chat Bots Grid -->
            <div class="chat-grid">
            <!-- Gemini Chat -->
            <div class="chat-bot" id="gemini-chat">
                <div class="chat-bot-header">
                    <div class="bot-avatar gemini-avatar">
                        <img src="assets/gemini_logo.png" alt="Gemini" class="bot-logo">
                    </div>
                    <div>
                        <div class="bot-name">Gemini</div>
                        <div class="bot-status online" id="gemini-status">Online</div>
                    </div>
                    <button class="maximize-btn" data-chat="gemini-chat" title="Maximize">
                        <span class="maximize-icon">⛶</span>
                    </button>
                </div>
                <div class="chat-messages" id="gemini-messages">
                </div>
            </div>

            <!-- ChatGPT Chat -->
            <div class="chat-bot" id="chatgpt-chat">
                <div class="chat-bot-header">
                    <div class="bot-avatar chatgpt-avatar">
                        <img src="assets/chatgpt_logo.jpg" alt="ChatGPT" class="bot-logo">
                    </div>
                    <div>
                        <div class="bot-name">ChatGPT</div>
                        <div class="bot-status online" id="chatgpt-status">Online</div>
                    </div>
                    <button class="maximize-btn" data-chat="chatgpt-chat" title="Maximize">
                        <span class="maximize-icon">⛶</span>
                    </button>
                </div>
                <div class="chat-messages" id="chatgpt-messages">
                </div>
            </div>

            <!-- Claude Chat -->
            <div class="chat-bot" id="claude-chat">
                <div class="chat-bot-header">
                    <div class="bot-avatar claude-avatar">
                        <img src="assets/claude_logo.png" alt="Claude" class="bot-logo">
                    </div>
                    <div>
                        <div class="bot-name">Claude</div>
                        <div class="bot-status online" id="claude-status">Online</div>
                    </div>
                    <button class="maximize-btn" data-chat="claude-chat" title="Maximize">
                        <span class="maximize-icon">⛶</span>
                    </button>
                </div>
                <div class="chat-messages" id="claude-messages">
                </div>
            </div>

            <!-- Grok Chat -->
            <div class="chat-bot" id="grok-chat">
                <div class="chat-bot-header">
                    <div class="bot-avatar grok-avatar">
                        <img src="assets/grok_logo.jpeg" alt="Grok" class="bot-logo">
                    </div>
                    <div>
                        <div class="bot-name">Grok</div>
                        <div class="bot-status online" id="grok-status">Online</div>
                    </div>
                    <button class="maximize-btn" data-chat="grok-chat" title="Maximize">
                        <span class="maximize-icon">⛶</span>
                    </button>
                </div>
                <div class="chat-messages" id="grok-messages">
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section" id="inputSection">
            <div class="drag-handle" id="dragHandle"></div>
            
            <div class="input-container">
                <textarea 
                    class="input-field" 
                    id="messageInput" 
                    placeholder="Type your message to all AI models..."
                    rows="1"
                ></textarea>
                <div class="button-group">
                    <!-- Plus Icon with Dropdown -->
                    <div class="plus-dropdown-container" id="plusDropdownContainer">
                        <button class="plus-button" id="plusButton" title="More Options">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            <!-- Selected Feature Icons -->
                            <div class="selected-features" id="selectedFeatures"></div>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div class="plus-dropdown-menu" id="plusDropdownMenu">
                            <div class="dropdown-item" data-feature="improve-prompt" id="improvePromptOption">
                                <div class="dropdown-item-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                        <path d="M2 17l10 5 10-5"/>
                                        <path d="M2 12l10 5 10-5"/>
                                    </svg>
                                </div>
                                <span class="dropdown-item-text">Improve Prompt</span>
                            </div>
                            
                            <div class="dropdown-item" data-feature="think-longer" id="thinkLongerOption">
                                <div class="dropdown-item-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="3"/>
                                        <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"/>
                                    </svg>
                                </div>
                                <span class="dropdown-item-text">Think Longer</span>
                            </div>
                            
                            <div class="dropdown-item" data-feature="clear-chat" id="clearChatOption">
                                <div class="dropdown-item-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14Z"/>
                                        <path d="M10 11v6M14 11v6"/>
                                    </svg>
                                </div>
                                <span class="dropdown-item-text">Clear Chat</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Send Button -->
                    <button class="send-button" id="sendButton" title="Send to All">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                    
                    <!-- Model Selection Dropdown Third -->
                    <div class="dropdown-container" id="chatbotSelector">
                        <button class="dropdown-toggle" id="dropdownToggle">
                            <img src="assets/all_models.jpg" alt="All Models" class="selected-icon">
                            <span class="dropdown-arrow">▲</span>
                        </button>
                        <div class="dropdown-menu" id="dropdownMenu">
                            <div class="dropdown-option active" data-value="all">
                                <img src="assets/all_models.jpg" alt="All Models" class="option-icon">
                                <span class="option-text">All Models</span>
                                <span class="option-shortcut">Ctrl+1</span>
                            </div>
                            <div class="dropdown-option" data-value="gemini">
                                <img src="assets/gemini_logo.png" alt="Gemini" class="option-icon">
                                <span class="option-text">Gemini</span>
                                <span class="option-shortcut">Ctrl+2</span>
                            </div>
                            <div class="dropdown-option" data-value="chatgpt">
                                <img src="assets/chatgpt_logo.jpg" alt="ChatGPT" class="option-icon">
                                <span class="option-text">ChatGPT</span>
                                <span class="option-shortcut">Ctrl+3</span>
                            </div>
                            <div class="dropdown-option" data-value="claude">
                                <img src="assets/claude_logo.png" alt="Claude" class="option-icon">
                                <span class="option-text">Claude</span>
                                <span class="option-shortcut">Ctrl+4</span>
                            </div>
                            <div class="dropdown-option" data-value="grok">
                                <img src="assets/grok_logo.jpeg" alt="Grok" class="option-icon">
                                <span class="option-text">Grok</span>
                                <span class="option-shortcut">Ctrl+5</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <!-- Prism.js for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="js/new.js"></script>
</body>
</html>
